<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Saver</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js" type="text/javascript"></script>
  <link rel="stylesheet" href="taskpane.css">
</head>
<body>
  <div id="login-screen" style="display:none; text-align:center; padding:40px 20px;">
    <p>Sign in with your Microsoft account to use Contact Saver.</p>
    <button id="btn-login">Sign In</button>
  </div>
  <div id="main-content">
    <div id="duplicate-banner" class="banner banner-warning" style="display:none">
      <span id="duplicate-text"></span>
    </div>
    <div id="status-message" style="display:none"></div>
    <form id="contact-form" onsubmit="return false">
      <div class="field-group"><label for="field-firstName">First Name</label><input type="text" id="field-firstName" placeholder="First name"></div>
      <div class="field-group"><label for="field-lastName">Last Name</label><input type="text" id="field-lastName" placeholder="Last name"></div>
      <div class="field-group"><label for="field-email">Email *</label><input type="email" id="field-email" placeholder="email@example.com"></div>
      <div class="field-group"><label for="field-mobile">Mobile</label><input type="text" id="field-mobile" placeholder="+46 70 000 00 00"></div>
      <div class="field-group"><label for="field-phone">Phone</label><input type="text" id="field-phone" placeholder="+46 8 000 00 00"></div>
      <div class="field-group"><label for="field-title">Title</label><input type="text" id="field-title" placeholder="Job title"></div>
      <div class="field-group"><label for="field-company">Company</label><input type="text" id="field-company" placeholder="Company name"></div>
      <div class="field-group"><label for="field-street">Street</label><input type="text" id="field-street" placeholder="Street address"></div>
      <div class="field-group"><label for="field-city">City</label><input type="text" id="field-city" placeholder="City"></div>
      <div class="field-group"><label for="field-postal">Postal Code</label><input type="text" id="field-postal" placeholder="12345"></div>
      <div class="field-group"><label for="field-country">Country</label><input type="text" id="field-country" placeholder="Sweden"></div>
    </form>
    <div class="button-row">
      <button id="btn-save" class="btn-primary">Save Contact</button>
      <button id="btn-update" class="btn-primary" style="display:none">Update Existing</button>
      <button id="btn-cancel" class="btn-secondary">Cancel</button>
    </div>
  </div>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="graph.js"></script>
  <script src="extractor.js"></script>
  <script src="taskpane.js"></script>
</body>
</html>
